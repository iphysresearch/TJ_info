{{ define "main" }}
<div class="container">
    <h1>{{ .Title }}</h1>
    {{ .Content }}

    <div class="list-items">
        {{ range .Pages }}
        <article class="list-item">
            <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            <div class="meta">{{ .Date.Format "January 2, 2006" }}</div>
            {{ .Summary }}
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
