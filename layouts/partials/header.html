<header class="site-header">
    <div class="container">
        <div class="header-content">
            <div class="logo">
                <a href="{{ "/" | relURL }}">
                    <img src="{{ "/images/taiji-logo.svg" | relURL }}" alt="Taiji Logo" class="logo-image">
                    <span class="logo-text">{{ .Site.Params.logo.text }}</span>
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    {{ range .Site.Menus.main }}
                    <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
                    {{ end }}
                </ul>
            </nav>
        </div>
    </div>
</header>
